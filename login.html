<!DOCTYPE html>

<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notely — Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1814;
      --card: #f5f3ee;
      --text: #1a1814;
      --muted: #7a756c;
      --border: #e2ddd5;
      --accent: #c9502c;
    }

    [data-theme="dark"] {
      --bg: #131210;
      --card: #1e1c19;
      --text: #f0ede6;
      --muted: #9a948a;
      --border: #2e2b27;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      transition: background 0.25s ease;
    }

    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 44px 40px;
      width: min(440px, 100%);
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      transition: background 0.25s ease, color 0.25s ease;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon { font-size: 1.6rem; color: var(--accent); }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text);
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: var(--accent); }

    .btn-login {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-login:hover { opacity: 0.88; transform: translateY(-1px); }

    .error-msg {
      color: #e53935;
      font-size: 0.85rem;
      margin-top: 12px;
      min-height: 20px;
      text-align: center;
    }

    .register-link {
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 20px;
    }

    .register-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
  </style>

</head>

<body>
  <button class="theme-toggle" id="themeBtn">🌙</button>

  <div class="card">
    <div class="logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">Notely</span>
    </div>

  </div>

  <script>
    const API = 'http://localhost:3000';

    // ===== THEME =====
    const savedTheme = localStorage.getItem('theme') || 'light';
    applyTheme(savedTheme);

    document.getElementById('themeBtn').addEventListener('click', () => {
      const curr = document.documentElement.getAttribute('data-theme');
      applyTheme(curr === 'dark' ? 'light' : 'dark');
    });

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      document.getElementById('themeBtn').textContent =
        theme === 'dark' ? '☀️' : '🌙';
    }

    // ===== LOGIN =====
    document.getElementById('loginForm').addEventListener('submit', handleLogin);

    async function handleLogin(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const err = document.getElementById('errorMsg');

      err.textContent = '';

      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          err.textContent = data.message || 'Invalid credentials';
          return;
        }

        localStorage.setItem('token', data.token);
        window.location.href = 'index.html';

      } catch {
        err.textContent = '⚠️ Server not reachable';
      }
    }
  </script>

</body>
</html>
