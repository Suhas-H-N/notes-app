<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notely — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #1a1814;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .card {
      background: #f5f3ee; border-radius: 20px;
      padding: 44px 40px; width: min(440px, 100%);
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-icon { font-size: 1.6rem; color: #c9502c; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 700; color: #1a1814; }
    .card h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 500; color: #1a1814; margin-bottom: 6px; }
    .card p { color: #7a756c; font-size: 0.9rem; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.85rem; font-weight: 500; color: #4a463f; margin-bottom: 6px; }
    .field input {
      width: 100%; background: #fff;
      border: 1.5px solid #e2ddd5; border-radius: 10px;
      padding: 12px 14px; font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; color: #1a1814; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #c9502c; }
    .field input::placeholder { color: #b0ab9f; }
    .btn-login {
      width: 100%; background: #c9502c; color: #fff; border: none;
      padding: 13px; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500;
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-login:hover { opacity: 0.88; transform: translateY(-1px); }
    .error-msg { color: #c9502c; font-size: 0.85rem; margin-top: 12px; min-height: 20px; text-align: center; }
    .register-link { text-align: center; font-size: 0.875rem; color: #7a756c; margin-top: 20px; }
    .register-link a { color: #c9502c; text-decoration: none; font-weight: 500; }
    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">Notely</span>
    </div>
    <h2>Welcome back</h2>
    <p>Sign in to your notes</p>

    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-login">Sign In</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>

    <div class="register-link">
      Don't have an account? <a href="#">Create one</a>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const err = document.getElementById('errorMsg');
      if (email && password) {
        window.location.href = 'index.html';
      } else {
        err.textContent = 'Please enter valid credentials.';
      }
    }
  </script>
</body>
</html>
