<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notely — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <button class="theme-toggle" id="themeBtn" title="Toggle theme">🌙</button>

  <div class="auth-page">
    <div class="auth-card">

      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">Notely</span>
      </div>

      <h2>Welcome back</h2>
      <p class="auth-sub">Sign in to your notes</p>

      <form id="loginForm" novalidate>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-pw-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" id="pwToggle" tabindex="-1" title="Show/hide password">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">Sign In</button>
        <div class="error-msg" id="errorMsg" role="alert"></div>

      </form>

      <p class="auth-link">
        Don't have an account? <a href="register.html">Create one</a>
      </p>

    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    const API = 'http://localhost:3000';

    // Redirect if already logged in
    if (localStorage.getItem('token')) window.location.href = 'index.html';

    // ── LOGIN ──────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('errorMsg');
      const btn      = document.getElementById('submitBtn');

      errEl.textContent = '';
      btn.textContent   = 'Signing in…';
      btn.disabled      = true;

      try {
        const res  = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.message || 'Invalid credentials';
          btn.textContent   = 'Sign In';
          btn.disabled      = false;
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('userName', data.user.name);
        window.location.href = 'index.html';

      } catch {
        errEl.textContent = '⚠️ Cannot reach server. Is the backend running?';
        btn.textContent   = 'Sign In';
        btn.disabled      = false;
      }
    });

    // ── PASSWORD TOGGLE ────────────────────────
    document.getElementById('pwToggle').addEventListener('click', () => {
      const inp = document.getElementById('password');
      const btn = document.getElementById('pwToggle');
      if (inp.type === 'password') { inp.type = 'text';     btn.textContent = '🙈'; }
      else                         { inp.type = 'password'; btn.textContent = '👁'; }
    });
  </script>

</body>
</html>
